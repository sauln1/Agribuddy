name: Claude BugBot

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  bugbot:
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: rekpero/claude-bugbot-github-action@main
        with:
          claude-setup-token: ${{ secrets.ANTHROPIC_API_KEY }}
